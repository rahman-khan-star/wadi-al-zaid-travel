<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Orange sun circle -->
  <circle cx="100" cy="85" r="70" fill="#E8952F"/>
  
  <!-- Blue airplane - tilted and dynamic -->
  <g transform="translate(100,70) rotate(-30)">
    <!-- Fuselage -->
    <path d="M0,-40 L6,-40 L4,25 L-4,25 Z" fill="#2B7CB9"/>
    <!-- Left wing - swept back -->
    <path d="M-4,-8 L-45,10 L-42,16 L-4,2 Z" fill="#2B7CB9"/>
    <!-- Right wing - swept back -->
    <path d="M4,-8 L45,10 L42,16 L4,2 Z" fill="#2B7CB9"/>
    <!-- Tail fin left -->
    <path d="M-3,20 L-14,32 L-11,36 L-2,26 Z" fill="#2B7CB9"/>
    <!-- Tail fin right -->
    <path d="M3,20 L14,32 L11,36 L2,26 Z" fill="#2B7CB9"/>
  </g>
  
  <!-- Wave 1 - flowing -->
  <path d="M15,155 Q40,138 65,155 Q90,172 115,155 Q140,138 165,155 Q180,165 195,158" 
        stroke="#2B7CB9" stroke-width="9" fill="none" stroke-linecap="round"/>
  
  <!-- Wave 2 - flowing -->
  <path d="M10,172 Q35,155 60,172 Q85,189 110,172 Q135,155 160,172 Q180,183 200,176" 
        stroke="#2B7CB9" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
</svg>