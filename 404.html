<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Wadi Al Zaid Tours &amp; Travel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="components.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0f1d3a', light: '#1a2c50', dark: '#091428' },
            accent: { DEFAULT: '#e8952f', light: '#f0a94e', dark: '#c47a1f' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(2deg); } }
    @keyframes floatSlow { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-12px) rotate(-1deg); } }
    @keyframes dash { to { stroke-dashoffset: 0; } }
    @keyframes fadeScaleUp { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(232, 149, 47, 0.4); } 50% { box-shadow: 0 0 0 15px rgba(232, 149, 47, 0); } }
    @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
    .float-anim { animation: float 6s ease-in-out infinite; }
    .float-slow { animation: floatSlow 5s ease-in-out infinite 0.5s; }
    .fade-scale-up { animation: fadeScaleUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; }
    .fade-scale-up-d1 { animation-delay: 0.15s; }
    .fade-scale-up-d2 { animation-delay: 0.3s; }
    .fade-scale-up-d3 { animation-delay: 0.45s; }
    .fade-scale-up-d4 { animation-delay: 0.6s; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .wiggle-hover:hover { animation: wiggle 0.4s ease-in-out; }
    .gradient-mesh { background: radial-gradient(ellipse at 20% 50%, rgba(232,149,47,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(15,29,58,0.06) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(59,130,246,0.05) 0%, transparent 50%); }
    .glass-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.8); }
    .text-gradient { background: linear-gradient(135deg, var(--navy) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
</head>
<body class="bg-gray-50 text-navy font-sans antialiased overflow-hidden">

  <!-- ========== NAVBAR ========== -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-navy/95 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <a href="index.html" class="flex items-center gap-3 group">
          <img src="logo.svg" alt="Wadi Al Zaid" class="w-9 h-9 sm:w-11 sm:h-11 transition-transform group-hover:scale-110 group-hover:rotate-3" />
          <div class="leading-tight">
            <span class="text-lg sm:text-xl font-extrabold text-white tracking-tight">Wadi Al Zaid</span>
            <span class="block text-[8px] sm:text-[10px] uppercase tracking-[3px] text-accent font-medium">Tours &amp; Travel</span>
          </div>
        </a>
        <a href="index.html" class="px-5 py-2.5 bg-accent hover:bg-accent-dark text-white font-semibold text-sm rounded-xl transition-all hover:scale-105 hover:shadow-lg hover:shadow-accent/25">
          <i class="fas fa-home mr-2"></i>Home
        </a>
      </div>
    </div>
  </nav>

  <!-- ========== 404 CONTENT ========== -->
  <main class="min-h-screen flex items-center justify-center relative gradient-mesh">

    <!-- Floating decorative elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute top-[15%] left-[8%] float-anim">
        <div class="w-16 h-16 rounded-2xl bg-accent/10 flex items-center justify-center rotate-12">
          <i class="fas fa-plane text-accent/30 text-2xl"></i>
        </div>
      </div>
      <div class="absolute top-[25%] right-[12%] float-slow">
        <div class="w-12 h-12 rounded-full bg-navy/5 flex items-center justify-center">
          <i class="fas fa-globe-americas text-navy/15 text-xl"></i>
        </div>
      </div>
      <div class="absolute bottom-[20%] left-[15%] float-slow" style="animation-delay: 1s">
        <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center -rotate-12">
          <i class="fas fa-compass text-blue-400/20 text-lg"></i>
        </div>
      </div>
      <div class="absolute bottom-[30%] right-[8%] float-anim" style="animation-delay: 1.5s">
        <div class="w-14 h-14 rounded-2xl bg-accent/8 flex items-center justify-center rotate-6">
          <i class="fas fa-map-marked-alt text-accent/20 text-xl"></i>
        </div>
      </div>
      <div class="absolute top-[60%] left-[5%] float-anim" style="animation-delay: 2s">
        <div class="w-8 h-8 rounded-lg bg-green-500/10 flex items-center justify-center">
          <i class="fas fa-palm-tree text-green-500/20 text-sm"></i>
        </div>
      </div>
      <!-- Grid dots pattern -->
      <svg class="absolute top-0 left-0 w-full h-full opacity-[0.03]" xmlns="http://www.w3.org/2000/svg">
        <defs><pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill="currentColor"/></pattern></defs>
        <rect width="100%" height="100%" fill="url(#dots)"/>
      </svg>
    </div>

    <div class="relative z-10 text-center px-4 sm:px-6 max-w-2xl mx-auto">

      <!-- 404 Illustration -->
      <div class="fade-scale-up mb-6 sm:mb-8">
        <div class="relative inline-block">
          <!-- Large 404 number -->
          <div class="relative">
            <span class="text-[120px] sm:text-[180px] lg:text-[220px] font-black leading-none select-none" style="background: linear-gradient(135deg, #0f1d3a 0%, #1a2c50 40%, #e8952f 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; opacity: 0.12;">
              404
            </span>
            <!-- Centered compass icon -->
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-24 h-24 sm:w-32 sm:h-32 rounded-full bg-white shadow-2xl shadow-navy/10 flex items-center justify-center wiggle-hover cursor-pointer border-4 border-accent/20">
                <div class="text-center">
                  <i class="fas fa-compass text-4xl sm:text-5xl text-accent animate-spin" style="animation-duration: 8s;"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Text Content -->
      <div class="fade-scale-up fade-scale-up-d1 mb-4">
        <span class="inline-block px-4 py-1.5 bg-accent/10 text-accent text-xs font-bold uppercase tracking-widest rounded-full mb-4">
          Lost in Transit
        </span>
      </div>

      <h1 class="fade-scale-up fade-scale-up-d2 text-4xl sm:text-5xl lg:text-6xl font-black mb-4 leading-tight">
        <span class="text-gradient">Oops! Wrong Destination</span>
      </h1>

      <p class="fade-scale-up fade-scale-up-d3 text-gray-500 text-base sm:text-lg leading-relaxed mb-8 max-w-md mx-auto">
        Looks like this page took a wrong turn on its journey. Don't worry — let's get you back on the right path.
      </p>

      <!-- Action Buttons -->
      <div class="fade-scale-up fade-scale-up-d4 flex flex-col sm:flex-row items-center justify-center gap-4">
        <a href="index.html" class="group w-full sm:w-auto inline-flex items-center justify-center gap-3 px-8 py-4 bg-accent hover:bg-accent-dark text-white font-bold text-sm rounded-2xl transition-all duration-300 hover:scale-105 hover:shadow-xl hover:shadow-accent/30 pulse-glow">
          <i class="fas fa-home text-base transition-transform group-hover:-translate-y-0.5"></i>
          Back to Home
          <i class="fas fa-arrow-right text-xs transition-transform group-hover:translate-x-1"></i>
        </a>
        <button onclick="history.back()" class="group w-full sm:w-auto inline-flex items-center justify-center gap-3 px-8 py-4 bg-white hover:bg-gray-50 text-navy font-bold text-sm rounded-2xl border-2 border-gray-200 hover:border-navy/20 transition-all duration-300 hover:scale-105 hover:shadow-lg">
          <i class="fas fa-arrow-left text-base transition-transform group-hover:-translate-x-1"></i>
          Go Back
        </button>
      </div>

      <!-- Quick Links -->
      <div class="fade-scale-up fade-scale-up-d4 mt-10 pt-8 border-t border-gray-200/60">
        <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold mb-4">Quick Links</p>
        <div class="flex flex-wrap items-center justify-center gap-3">
          <a href="index.html#destinations" class="glass-card px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:text-accent hover:border-accent/30 transition-all duration-300 hover:shadow-md flex items-center gap-2">
            <i class="fas fa-map-marker-alt text-accent/60"></i> Destinations
          </a>
          <a href="about.html" class="glass-card px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:text-accent hover:border-accent/30 transition-all duration-300 hover:shadow-md flex items-center gap-2">
            <i class="fas fa-info-circle text-accent/60"></i> About Us
          </a>
          <a href="contact.html" class="glass-card px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:text-accent hover:border-accent/30 transition-all duration-300 hover:shadow-md flex items-center gap-2">
            <i class="fas fa-envelope text-accent/60"></i> Contact
          </a>
          <a href="support.html" class="glass-card px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:text-accent hover:border-accent/30 transition-all duration-300 hover:shadow-md flex items-center gap-2">
            <i class="fas fa-headset text-accent/60"></i> Help Center
          </a>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Parallax floating elements on mouse move
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;
      document.querySelectorAll('.float-anim, .float-slow').forEach((el, i) => {
        const speed = (i + 1) * 5;
        el.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
      });
    });
  </script>
</body>
</html>
